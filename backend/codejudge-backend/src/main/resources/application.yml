spring:
  application:
    name: codejudge-backend
  # 榛樿 dev 鐜
  profiles:
    active: dev
  # 鏀寔 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # session 閰嶇疆
  session:
    # todo 鍙栨秷娉ㄩ噴寮€鍚垎甯冨紡 session锛堥』鍏堥厤缃?Redis锛?
    store-type: redis
    # 30 澶╄繃鏈?
    timeout: 2592000
  # 鏁版嵁搴撻厤缃?
  # todo 闇€鏇挎崲閰嶇疆
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/codejudge
    username: root
    password: 123456
  # Redis 閰嶇疆
  # todo 闇€鏇挎崲閰嶇疆锛岀劧鍚庡彇娑堟敞閲?
  redis:
    database: 1
    host: localhost
    port: 6379
    timeout: 5000
#    password: 123456
  # Elasticsearch 閰嶇疆
  # todo 闇€鏇挎崲閰嶇疆锛岀劧鍚庡彇娑堟敞閲?
#  elasticsearch:
#    uris: http://localhost:9200
#    username: root
#    password: 123456
  # 鏂囦欢涓婁紶
  servlet:
    multipart:
      # 澶у皬闄愬埗
      max-file-size: 10MB
server:
  address: 0.0.0.0
  port: 8121
  servlet:
    context-path: /api
    # cookie 30 澶╄繃鏈?
    session:
      cookie:
        max-age: 2592000
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 鍏ㄥ眬閫昏緫鍒犻櫎鐨勫疄浣撳瓧娈靛悕
      logic-delete-value: 1 # 閫昏緫宸插垹闄ゅ€硷紙榛樿涓?1锛?
      logic-not-delete-value: 0 # 閫昏緫鏈垹闄ゅ€硷紙榛樿涓?0锛?
# 寰俊鐩稿叧
wx:
  # 寰俊鍏紬骞冲彴
  # todo 闇€鏇挎崲閰嶇疆
  mp:
    token: xxx
    aesKey: xxx
    appId: xxx
    secret: xxx
    config-storage:
      http-client-type: HttpClient
      key-prefix: wx
      redis:
        host: 127.0.0.1
        port: 6379
      type: Memory
  # 寰俊寮€鏀惧钩鍙?
  # todo 闇€鏇挎崲閰嶇疆
  open:
    appId: xxx
    appSecret: xxx
# 瀵硅薄瀛樺偍
